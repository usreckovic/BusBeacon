<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Beacon :: Edit Ticket</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

    <div class="TicketTitleE">
        <i class="fa-solid fa-pen-to-square"></i> <label>Edit Ticket</label>
    </div>

    <div class="editTicketContainer">

        <div class="mb-3">
            <label for="Year" class="form-label">Id:</label>
            <input type="number" class="form-control" id="ticketId" disabled>
        </div>

        <div class="mb-3">
            <label class="form-label">From:</label>
            <select id="EditTicketFrom" class="form-select" onblur="checkTicketFrom()"></select>
            <span id="errorTicketFrom"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">To:</label>
            <select id="EditTicketTo" class="form-select" onblur="checkTicketTo()"></select>
            <span id="errorTicketTo"></span>
        </div>

        <div class="mb-3">
            <label for="Price" class="form-label">Price:</label>
            <input type="number" class="form-control" id="EditTicketPrice">
            <span id="errorTicketPrice" lass="errorTicketPrice"></span>
        </div>

        <label>Choose Trip Type</label>
        <select class="form-select" id="ticketTripType" onblur="checkTripType()">
            <option value="One-Way">One Way</option>
            <option value="Round-Trip">Round Trip</option>
        </select>
        <span id="errorTicketTrip"></span>

        <label for="travelDateStart" class="form-label">Ticket valid from:</label>
        <input type="date" class="form-control" id="travelDateStart" onblur="checkTicketDate()">
        <span id="errorTravelDateStart" class="errorTravelDateStart"></span>

        <label for="travelDateEnd" class="form-label">Ticket valid until:</label>
        <input type="date" class="form-control" id="travelDateEnd" onblur="checkTicketDate()">
        <span id="errorTravelDateEnd" class="errorTravelDateEnd"></span>

        <div class="card-footer">
            <button type="button" class="btn btn-success" id="ticketSave" onclick="finalTicketCheckUp()">
                <i class="fa-solid fa-floppy-disk"></i> Save
            </button>
            <span id="errorBusSave"></span>
        </div>
    </div>

    <script src="script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            loadTicketCities();
        });
    </script>

    <script>
        let extractedInfo = new URLSearchParams(window.location.search)
        let id = extractedInfo.get('id')

        let inputTicketId = document.getElementById('ticketId')
        let inputDateStart = document.getElementById('travelDateStart')
        let inputDateEnd = document.getElementById('travelDateEnd')
        let inputTripType = document.getElementById('ticketTripType')
        let inputPrice = document.getElementById('EditTicketPrice')
        let inputTo = document.getElementById('EditTicketTo')
        let inputFrom = document.getElementById('EditTicketFrom')

        if (id == null || id == '') {
            openTickets()
        }

        getUrlData(`/api/ticket/${id}`, (data) => {
            inputTicketId.value = data.ticketId
            inputDateStart.value = data.travelDateStart;
            inputDateEnd.value = data.travelDateEnd;
            inputTripType.value = data.tripType;
            inputPrice.value = data.price;
            inputFrom.value = data.fromStation.stationId;
            inputTo.value = data.toStation.stationId;
        });

        document.getElementById('ticketSave').addEventListener('click', () => {
            let checkUp = finalTicketCheckUp();
            if (!checkUp) return;
            let confirmingUser = window.confirm('Save changes?');
            if (confirmingUser) {
                fetch(`api/ticket/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        travelDateStart: inputDateStart.value,
                        travelDateEnd: inputDateEnd.value,
                        tripType: inputTripType.value,
                        price: inputPrice.value,
                        fromStation: {
                            stationId: parseInt(inputFrom.value)
                        },
                        toStation: {
                            stationId: parseInt(inputTo.value)
                        }
                    })
                })
                    .then(rsp => {
                        if (rsp.ok) {
                            openTickets();
                        }
                    });
            }
        });


    </script>


</body>

</html>
