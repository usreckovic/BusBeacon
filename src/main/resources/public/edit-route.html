<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Beacon :: Add Route</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

    <div class="stationsTitleAE">
        <i class="fa-solid fa-plus"></i> <label>Add Route</label>
    </div>

    <div class="addRouteContainer">
        <div class="mb-3">
            <label>Bus</label>
            <select id="busSelect" class="form-select"></select>
        </div>

        <div class="mb-3">
            <label>Route Name</label>
            <input type="text" id="routeName" class="form-control">
        </div>

        <div class="mb-3">
            <label>Departure</label>
            <input type="datetime-local" id="departureTime" class="form-control">
        </div>

        <div class="mb-3">
            <label>Arrival</label>
            <input type="datetime-local" id="arrivalTime" class="form-control">
        </div>

        <div class="mb-3">
            <label>Stations (order 1,2,3)</label>
            <div class="row">
                <div class="col-md-4"><select id="station1" class="form-select"></select></div>
                <div class="col-md-4"><select id="station2" class="form-select"></select></div>
                <div class="col-md-4"><select id="station3" class="form-select"></select></div>
            </div>
        </div>

        <button id="addRouteSave" class="btn btn-success" onclick="saveRoute()"><i class="fa-solid fa-floppy-disk"></i>
            Create</button>
    </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadRouteData();
        });
    </script>
    <script>
        const routeId = new URLSearchParams(window.location.search).get("id");

        fetch(`/api/route/${routeId}`)
            .then(rsp => rsp.json())
            .then(route => {

                document.getElementById("routeName").value = route.name;
                document.getElementById("departureTime").value = route.departureTime;
                document.getElementById("arrivalTime").value = route.arrivalTime;
                document.getElementById("busSelect").value = route.bus.busId;

            });
    </script>
</body>

</html>
