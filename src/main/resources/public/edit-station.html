<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Beacon :: Edit Station</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

    <div class="stationsTitleAE">
        <i class="fa-solid fa-pen-to-square"></i> <label>Edit Station</label>
    </div>

    <div class="editStationContainer">
        <div class="mb-3">
            <label for="id" class="form-label">ID:</label>
            <input type="number" class="form-control" id="stationId" disabled>
        </div>

        <div class="mb-3">
            <label for="Brand" class="form-label">City:</label>
            <input type="text" class="form-control" id="stationCity" onblur="checkCity()">
            <span id="errorStationCity" class="errorStationCity"></span>
        </div>

        <div class="mb-3">
            <label for="Model" class="form-label">Address:</label>
            <input type="text" class="form-control" id="stationAddress" onblur="checkAddress()">
            <span id="errorStationAddress" class="errorStationAddress"></span>

        </div>

        <div class="mb-3">
            <label for="Year" class="form-label">Gates</label>
            <input type="number" class="form-control" id="stationGates" onblur="checkGates()">
            <span id="errorStationGate"></span>
        </div>

        <div class="card-footer">
            <button type="button" class="btn btn-success" id="stationSave" onclick="finalStationCheckUp()">
                <i class="fa-solid fa-floppy-disk"></i> Save
            </button>
            <span id="errorBusSave"></span>
        </div>
    </div>

    <script src="script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>

    <script>
        let extractedInfo = new URLSearchParams(window.location.search)
        let id = extractedInfo.get('id')

        let inputStationId = document.getElementById('stationId')
        let inputCity = document.getElementById('stationCity')
        let inputAddress = document.getElementById('stationAddress')
        let inputGates = document.getElementById('stationGates')

        if (id == null || id == '') {
            openStations()
        }

        getUrlData(`/api/station/${id}`, (data) => {
            inputStationId.value = data.stationId
            inputCity.value = data.city
            inputAddress.value = data.address
            inputGates.value = data.gates
        })

        document.getElementById('stationSave').addEventListener('click', () => {
            let checkUp = finalStationCheckUp();
            if (!checkUp) return;
            let confirmingUser = window.confirm('Save changes?');
            if (confirmingUser) {
                fetch(`api/station/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        city: inputCity.value,
                        address: inputAddress.value,
                        gates: inputGates.value
                    })
                })
                    .then(rsp => {
                        if (rsp.ok) {
                            openStations();
                        }
                    });
            }
        });
    </script>


</body>

</html>
