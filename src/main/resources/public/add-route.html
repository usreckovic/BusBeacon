<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Beacon :: Add Route</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

    <div class="stationsTitleAE">
        <i class="fa-solid fa-plus"></i> <label>Add Route</label>
    </div>

    <div class="addRouteContainer">
        <div class="mb-3">
            <label>Bus</label>
            <select id="busSelect" class="form-select"></select>
        </div>

        <div class="mb-3">
            <label>Route Name</label>
            <input type="text" id="routeName" class="form-control">
        </div>

        <div class="mb-3">
            <label>Departure</label>
            <input type="datetime-local" id="departureTime" class="form-control">
        </div>

        <div class="mb-3">
            <label>Arrival</label>
            <input type="datetime-local" id="arrivalTime" class="form-control">
        </div>

        <div class="mb-3">
            <label>Stations (order 1,2,3)</label>
            <div class="row">
                <div class="col-md-4"><select id="station1" class="form-select"></select></div>
                <div class="col-md-4"><select id="station2" class="form-select"></select></div>
                <div class="col-md-4"><select id="station3" class="form-select"></select></div>
            </div>
        </div>

        <button id="addRouteSave" class="btn btn-success" onclick="saveRoute()"><i class="fa-solid fa-floppy-disk"></i> Create</button>
    </div>
    </div>

    <script src="script.js"></script>
    <script>
        fetch('/api/bus').then(rsp => rsp.json()).then(data => {
            let busSelect = document.getElementById('busSelect');
            data.forEach(bus => busSelect.innerHTML += `<option value="${bus.busId}">${bus.brand} ${bus.model}</option>`);
        });

        fetch('/api/station').then(rsp => rsp.json()).then(data => {
            ['station1', 'station2', 'station3'].forEach(id => {
                let sel = document.getElementById(id);
                data.forEach(Station => sel.innerHTML += `<option value="${Station.stationId}">${Station.city}</option>`);
            });
        });
    </script>

</body>

</html>
