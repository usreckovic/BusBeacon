<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Beacon :: Ticket</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body></body>
<div class="purchaseTicket">
    <h1 class="infoTicket">Your Ticket</h1>

    <div id="qrContainer">
        <img id="qrImage"></img>
    </div>
    <label style="color: rgb(248, 68, 68);">Please save your ticket url so you cant refer to it later</label>

    <div class="purchaseFrom">
        <i class="fa-solid fa-location-pin"></i> From:<label id="ticketFrom"></label> <i
            class="fa-solid fa-location-pin"></i>
    </div>

    <div class="purchaseTo">
        <i class="fa-solid fa-location-dot"></i> To:<label id="ticketTo"></label> <i
            class="fa-solid fa-location-dot"></i>
    </div>

    <div class="purchaseType">
        <i id="icon" class="fa-solid fa-share"> </i><label id="ticketTrip"></label> <i id="icon2"
            class="fa-solid fa-share"></i>
    </div>

    <div class="purchaseDateStart">
        <i class="fa-solid fa-calendar-days"> </i>Starting date:<label id="ticketDateStart"></label> <i
            class="fa-solid fa-calendar-days"></i>
    </div>

    <div class="purchaseDateEnd">
        <i class="fa-solid fa-calendar"></i> </i> Ending date:<label id="ticketDateEnd"></label> <i
            class="fa-solid fa-calendar"></i>
    </div>
</div>
</div>

<script src="script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const urlParams = new URLSearchParams(window.location.search);
        const ticketId = urlParams.get('id');

        if (!ticketId || ticketId.trim() === '') {
            window.location.href = './index.html';
            return;
        }
        let data = JSON.parse(localStorage.getItem('PurchaseTicketData'));

        if (!data || data.ticketId != ticketId) {
            window.location.href = './index.html';
            return;
        }

        loadPurchasedTicket();
        GeneratorOfQRCodes();
    });
</script>

<script>
    document.addEventListener('DOMContentLoaded',() => {
        let inputFrom = document.getElementById('ticketFrom');
        let inputTo = document.getElementById('ticketTo');
        let inputType = document.getElementById('ticketTrip');
        let inputDateStart = document.getElementById('ticketDateStart');
        let inputDateEnd = document.getElementById('ticketDateEnd');

        fetch('/api/ticket', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                fromStation: inputFrom.value,
                toStation: inputTo.value,
                ticketType: inputType.value,
                toStation: inputTo.value,
                travelDateStart:inputDateStart,
                travelDateEnd:inputDateEnd,
            })
        })
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>

</body>

</html>
