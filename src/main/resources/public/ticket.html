<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Beacon :: Ticket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body></body>
    <div class="purchaseTicket">
        <h1 class="infoTicket">Your Ticket</h1>
        <div class="purchaseFrom">
            <i class="fa-solid fa-location-pin"></i> From:<label id="ticketFrom"></label> <i
                class="fa-solid fa-location-pin"></i>
        </div>

        <div class="purchaseTo">
            <i class="fa-solid fa-location-dot"></i> To:<label id="ticketTo"></label> <i
                class="fa-solid fa-location-dot"></i>
        </div>

        <div class="purchaseType">
            <i id="icon" class="fa-solid fa-share"> </i><label id="ticketTrip"></label> <i id="icon2"
                class="fa-solid fa-share"></i>
        </div>

        <div class="purchaseDateStart">
            <i class="fa-solid fa-calendar-days"> </i>Starting date:<label id="ticketDateStart"></label> <i
                class="fa-solid fa-calendar-days"></i>
        </div>

        <div class="purchaseDateEnd">
            <i class="fa-solid fa-calendar"></i> </i> Ending date:<label id="ticketDateEnd"></label> <i
                class="fa-solid fa-calendar"></i>
        </div>
        <div class="purchaseEmail">
            <i class="fa-solid fa-envelope"> </i> Email: <label id="email"></label> <i class="fa-solid fa-envelope"></i>
        </div>

    </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            loadPurchasedTicket()
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>

</body>

</html>
