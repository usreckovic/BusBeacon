<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Beacon :: Home</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body data-bs-theme="white">
    <div class="container1">

        <div class="image">
            <img src="./images/Untitled-1.png"></img>
        </div>

        <div class="info">
            <h2>Contact</h2>
            <h3>Information</h3>
            <p><i class="fa-solid fa-square-envelope fa-l"></i> BusBeacon@bb.com</p>
            <p><i class="fa-solid fa-square-phone fa-l"></i> +381 555-888</p>
            <p><i class="fa-solid fa-clock fa-l"></i> 0-24 hours</p>
            <p><i class="fa-solid fa-map fa-l"></i> Železnička 4, Beograd</p>
        </div>

        <div class="ticket">
            <div class="type">
                <div>
                    <label for="from">From:</label>
                    <select id="from" name="from" onblur="checkFrom()"></select>
                    <span class="error" id="errorFrom"></span>
                </div>

                <div>
                    <label for="to" style="padding-left: 1.1vw;">To:</label>
                    <select id="to" name="to" onblur="checkTo()"></select>
                    <span class="error" id="errorTo"></span>
                </div>

                <div class="ways">
                    <label>Choose type of travel:</label>

                    <label for="one-way">
                        <input type="radio" id="one-way" name="trip" value="One-Way" onblur="checkTrip()">
                        <i class="fa-solid fa-share"></i> One Way
                    </label>

                    <label for="round-trip">
                        <input type="radio" id="round-trip" name="trip" value="Round-Trip" onblur="checkTrip()">
                        <i class="fa-solid fa-arrows-left-right"></i> Round Trip
                    </label>


                </div>
                <span class="error" id="errorTrip"></span>

            </div>

            <hr style="max-width: 1px ;border: 2px solid #ffffff; margin: 0px 0;" class="separetor">

            <div class="date">
                <label style="font-size: large;">Enter start and end date:</label>
                <span class="error" id="errorDate"></span>
                <input type="date" id="dateStart" value="date-start" onblur="checkDate()">
                <input type="date" id="dateEnd" value="date-end" onblur="checkDate()">

                <input type="button" value="Submit" id="submit" onclick="finalCheckUp()"></input>
                <span class="error" id="errorSubmit"></span>
            </div>


            <hr style="max-width: 1px ;border: 2px solid #ffffff; margin: 0px 0;" class="separetor">

            <div class="miniimage">
                <img src="./images/miniimage.png">
            </div>

        </div>

        <script src="script.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                loadCities();
            });
        </script>
        <script>
            
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
            </script>
</body>

</html>
